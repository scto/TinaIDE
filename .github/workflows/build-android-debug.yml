name: Android Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  
permissions:
  contents: read

concurrency:
  group: dev-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  TS_CLI_BUILD_FROM_SOURCE: 'false'
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"

jobs:
  build-debug-apk:
    runs-on: windows-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run Build Script (Debug)
        shell: powershell
        # Erzwinge UTF-8 Encoding für den PowerShell-Prozess
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          .\tools\build-apk.ps1 -Variant debug
          
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tinaide-debug-apk
          # Dein Skript speichert APKs in app/build/outputs/apk/
          path: app/build/outputs/apk/**/*.apk
          
